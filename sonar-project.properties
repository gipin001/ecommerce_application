sonar.projectKey=ecommerce_application
sonar.projectName=Ecommerce Application
sonar.projectVersion=1.0

# Source paths
sonar.sources=backend/src,frontend/src

# Exclusions
sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,**/*.test.js,**/*.spec.js

# JS/TS analysis
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# SonarQube server (matches docker-compose.infra.yml)
sonar.host.url=http://localhost:9000
# sonar.token is passed via environment variable SONAR_TOKEN — never hardcode it here
